{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Add Record</h2>
    <p class="text-gray-500 mt-1">Record a new faculty member and their publication</p>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-2xl">
    <form method="post">
        {% csrf_token %}
        
        <h3 class="text-xl font-semibold mb-4 text-gray-700 border-b pb-2">Faculty Details</h3>
        {{ faculty_form|crispy }}
        
        <h3 class="text-xl font-semibold mt-8 mb-4 text-gray-700 border-b pb-2">Publication Details</h3>
        {{ pub_form|crispy }}
        
        <div class="mt-8 flex items-center space-x-4">
            <button type="submit" class="btn btn-primary">Save Record</button>
            <a href="{% url 'dashboard' %}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
