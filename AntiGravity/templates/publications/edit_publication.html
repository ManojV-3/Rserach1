{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Edit Publication</h2>
    <p class="text-gray-500 mt-1">Update details for: {{ pub.title }}</p>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-2xl">
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        
        <div class="mt-6 flex items-center space-x-4">
            <button type="submit" class="btn btn-primary">Update Publication</button>
            <a href="{% url 'dashboard' %}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
