{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-xl shadow-xl overflow-hidden">
        <div class="bg-blue-600 p-6 text-center">
            <h2 class="text-2xl font-bold text-white">Research Publications</h2>
            <p class="text-blue-100 mt-1">Sign in to manage publications</p>
        </div>
        <div class="p-8">
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-full mt-4">Sign In</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
